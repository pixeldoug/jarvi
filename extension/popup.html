<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Jarvi Gmail Assistant</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="jarvi-popup">
    <main class="jarvi-popup-card">
      <h1>Jarvi Gmail Assistant</h1>
      <p class="jarvi-popup-subtitle">
        Configure API URL, login URL e JWT para criar sugestoes de tarefas.
      </p>

      <label class="jarvi-label" for="apiBaseUrl">Jarvi API URL</label>
      <input
        id="apiBaseUrl"
        class="jarvi-input"
        type="url"
        placeholder="http://localhost:3001"
      />

      <label class="jarvi-label" for="loginUrl">Jarvi Login URL</label>
      <input
        id="loginUrl"
        class="jarvi-input"
        type="url"
        placeholder="https://jarvi.life/login"
      />

      <label class="jarvi-label" for="jwtToken">JWT Token</label>
      <textarea
        id="jwtToken"
        class="jarvi-textarea"
        rows="4"
        placeholder="Cole o JWT aqui"
      ></textarea>

      <div class="jarvi-popup-actions">
        <button id="saveBtn" class="jarvi-btn jarvi-btn--primary">Save</button>
        <button id="testBtn" class="jarvi-btn">Test auth</button>
      </div>

      <div class="jarvi-popup-actions">
        <button id="openLoginBtn" class="jarvi-btn">Open login</button>
        <button id="clearBtn" class="jarvi-btn jarvi-btn--danger">Clear token</button>
      </div>

      <p id="status" class="jarvi-status" role="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
